<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RYM Genre Spinner</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #111;
        color: #fff;
    }

    canvas {
        margin: 20px auto;
        display: block;
        border-radius: 50%;
        border: 6px solid #444;
        background: #222;
    }

    button {
        padding: 12px 24px;
        font-size: 18px;
        cursor: pointer;
        margin-top: 10px;
    }

    #result {
        margin-top: 20px;
        font-size: 26px;
        font-weight: bold;
    }

    #sub {
        font-size: 14px;
        color: #aaa;
        margin-top: 10px;
    }
</style>
</head>
<body>

<h1>🎡 RYM Genre Spinner</h1>

<canvas id="wheel" width="400" height="400"></canvas>

<button onclick="spin()" id="spinBtn" disabled>Loading...</button>

<div id="result"></div>
<div id="sub"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let options = [];
let angle = 0;
let spinning = false;

// 🔥 Fetch full dataset automatically
async function loadGenres() {
    try {
        const res = await fetch("https://gist.githubusercontent.com/ewauq/1116dbc718509836e54fec375e3774a0/raw/");
        const text = await res.text();

        options = text.split("\n").map(s => s.trim()).filter(Boolean);

        document.getElementById("spinBtn").disabled = false;
        document.getElementById("spinBtn").innerText = "Spin";

        console.log("Loaded genres:", options.length);
    } catch (e) {
        document.getElementById("spinBtn").innerText = "Failed to load";
        console.error(e);
    }
}

function drawWheel() {
    const r = canvas.width / 2;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // lightweight visual wheel (fixed slices)
    for (let i = 0; i < 20; i++) {
        const start = (i / 20) * 2 * Math.PI + angle;

        ctx.fillStyle = `hsl(${i * 18}, 60%, 40%)`;

        ctx.beginPath();
        ctx.moveTo(r, r);
        ctx.arc(r, r, r, start, start + (2*Math.PI/20));
        ctx.fill();
    }

    // pointer
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.moveTo(r - 10, 10);
    ctx.lineTo(r + 10, 10);
    ctx.lineTo(r, 30);
    ctx.fill();
}

function spin() {
    if (spinning || options.length === 0) return;

    spinning = true;

    const targetIndex = Math.floor(Math.random() * options.length);

    const spinTurns = 10 + Math.random() * 5;
    const duration = 3000;
    let start = null;

    function animate(ts) {
        if (!start) start = ts;
        let progress = ts - start;

        let ease = 1 - Math.pow(1 - progress / duration, 3);
        angle = ease * spinTurns * 2 * Math.PI;

        drawWheel();

        if (progress < duration) {
            requestAnimationFrame(animate);
        } else {
            spinning = false;
            showResult(targetIndex);
        }
    }

    requestAnimationFrame(animate);
}

function showResult(i) {
    const main = options[i];

    const neighbors = [];
    for (let j = -3; j <= 3; j++) {
        if (j === 0) continue;
        let idx = (i + j + options.length) % options.length;
        neighbors.push(options[idx]);
    }

    document.getElementById("result").innerText = main;
    document.getElementById("sub").innerText =
        "Nearby: " + neighbors.join(" • ");
}

// init
drawWheel();
loadGenres();
</script>

</body>
</html>
